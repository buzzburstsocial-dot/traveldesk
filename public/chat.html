<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelDesk Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:      #2563eb;
      --accent-dark: #1d4ed8;
      --text:        #111827;
      --muted:       #6b7280;
      --border:      #e5e7eb;
      --surface:     #ffffff;
      --bg:          #f8fafc;
      --user-bg:     #2563eb;
      --ai-bg:       #f1f5f9;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Header ── */
    .chat-header {
      background: var(--accent);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-header-name { font-weight: 700; font-size: 0.95rem; line-height: 1.2; }
    .chat-header-status { font-size: 0.75rem; opacity: 0.8; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; }
    .powered-by { margin-left: auto; font-size: 0.68rem; opacity: 0.6; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .msg-avatar.ai { background: var(--accent); color: #fff; }
    .msg-avatar.user { background: #e5e7eb; color: var(--muted); }

    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg-bubble.ai {
      background: var(--ai-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.user {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--ai-bg);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* ── Alert notice ── */
    .alert-notice {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #92400e;
    }

    /* ── Input area ── */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-wrap { flex: 1; position: relative; }
    textarea#user-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    textarea#user-input:focus { border-color: var(--accent); }
    .btn-send {
      width: 40px; height: 40px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-send:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-send:active:not(:disabled) { transform: scale(0.93); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error ── */
    .error-bar {
      background: #fef2f2;
      border-top: 1px solid #fecaca;
      padding: 10px 1.25rem;
      font-size: 0.82rem;
      color: #ef4444;
      text-align: center;
      display: none;
    }
    .error-bar.show { display: block; }
  </style>
</head>
<body>

<div class="chat-header">
  <div class="chat-header-avatar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
  </div>
  <div>
    <div class="chat-header-name" id="header-name">Travel Assistant</div>
    <div class="chat-header-status"><span class="status-dot"></span> Online</div>
  </div>
  <div class="powered-by">Powered by Claude AI</div>
</div>

<div class="messages" id="messages"></div>

<div class="error-bar" id="error-bar"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Ask about your trip, destinations, bookings…" rows="1"></textarea>
  </div>
  <button class="btn-send" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const ALERT_RE = /<<<ALERT:[^>]*>>>/g;

  let agentId = new URLSearchParams(location.search).get('agent') || 'dev';
  let history = [];
  let isStreaming = false;
  let businessName = 'your travel agent';

  // ── Init ──
  async function init() {
    // Load public agent info
    try {
      const resp = await fetch(`/api/agent/${agentId}`);
      if (resp.ok) {
        const info = await resp.json();
        businessName = info.businessName || businessName;
        if (info.businessName) {
          document.getElementById('header-name').textContent = info.businessName;
          document.title = `${info.businessName} — Chat`;
        }
      }
    } catch {}

    // Greeting
    appendAiMessage(`Hi there! 👋 I'm the AI travel assistant for ${businessName}. How can I help with your travel plans today?`);
  }

  // ── Send message ──
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isStreaming) return;

    input.value = '';
    autoResize(input);
    hideError();

    appendUserMessage(text);
    history.push({ role: 'user', content: text });

    isStreaming = true;
    document.getElementById('send-btn').disabled = true;

    const typingRow = appendTyping();

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agentId, message: text, history: history.slice(0, -1) }),
      });

      if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        throw new Error(d.error || `Server error ${resp.status}`);
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';
      let alerted = false;
      let aiRow = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;

          let parsed;
          try { parsed = JSON.parse(line.slice(6).trim()); } catch { continue; }

          if (parsed.error) { throw new Error(parsed.error); }

          if (parsed.done) {
            if (parsed.alerted && !alerted) {
              alerted = true;
              appendAlertNotice();
            }
            break;
          }

          if (parsed.text) {
            if (aiRow === null) {
              typingRow.remove();
              aiRow = appendAiMessageStreaming();
            }
            fullText += parsed.text;
            const display = fullText.replace(ALERT_RE, (m) => {
              if (!alerted) alerted = true;
              return '';
            }).trim();
            aiRow.querySelector('.msg-bubble').textContent = display;
            scrollToBottom();
          }
        }
      }

      // Save clean response to history
      const cleanText = fullText.replace(ALERT_RE, '').trim();
      history.push({ role: 'assistant', content: cleanText });

    } catch (err) {
      typingRow?.remove();
      showError(err.message || 'Could not connect. Please try again.');
    } finally {
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }
  }

  // ── DOM helpers ──
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar user">You</div>
      <div class="msg-bubble user">${esc(text)}</div>
    `;
    messages().appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendAiMessage(text) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="msg-avatar ai">✈️</div>
      <div class="msg-bubble ai">${esc(text)}</div>
    `;
    messages().appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendAiMessageStreaming() {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `<div class="msg-avatar ai">✈️</div><div class="msg-bubble ai"></div>`;
    messages().appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="msg-avatar ai">✈️</div>
      <div class="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    messages().appendChild(row);
    scrollToBottom();
    return row;
  }

  function appendAlertNotice() {
    const el = document.createElement('div');
    el.className = 'alert-notice';
    el.innerHTML = `<span>📬</span> I've flagged this for ${esc(businessName)} — they'll follow up with you directly.`;
    messages().appendChild(el);
    scrollToBottom();
  }

  function showError(msg) {
    const bar = document.getElementById('error-bar');
    bar.textContent = msg;
    bar.classList.add('show');
  }
  function hideError() { document.getElementById('error-bar').classList.remove('show'); }

  function messages() { return document.getElementById('messages'); }
  function scrollToBottom() { const m = messages(); m.scrollTop = m.scrollHeight; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  document.getElementById('user-input').addEventListener('input', function() { autoResize(this); });
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  init();
</script>
</body>
</html>
